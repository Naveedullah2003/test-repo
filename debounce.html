<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Debounce & Throttle</title>
</head>
<body>
    <h1>Debounce & Throttle</h1>
    <input type="text" id="debounceInput" placeholder="Type something...">
    <script>
        function debounce(func, delay) {
            let timeoutId;
            return function(...args) {
                clearTimeout(timeoutId);
                timeoutId = setTimeout(() => {
                    func.apply(this, args);
                }, delay);
            };
        }
        const fetchData = (event) => {
            console.log('Fetching data for:', event.target.value);
        };

        const debounceField = debounce(fetchData, 1000);
        
        const input = document.getElementById('debounceInput');
        input.addEventListener('input', debounceField);
    </script>
    
</body>
</html>
