<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fetch API Project</title>
</head>
<body>
    <h1>Fetch API Project</h1>
    <h2>Fetch Get API Example</h2>
    <button id="fetchGetBtn">Fetch Get Data</button>
    <div id="getData"></div>

    <h2>Fetch Post API Example</h2>
    <form id="postForm">
        <input type="text" id="title" placeholder="Enter your title" required>
        <input type="text" id="body" placeholder="Enter your body" required>
        <button type="submit">Submit</button>
    </form>
    <div id="postResponse"></div>

    <script>
        // Fetch Get API Example
        const getBtn = document.getElementById('fetchGetBtn');
        getBtn.addEventListener('click', () => {
        fetch('https://jsonplaceholder.typicode.com/users/1')
            .then(response => response.json())
            .then(data => {
                document.getElementById('getData').textContent = JSON.stringify(data);
            })
            .catch(error => console.error('Error fetching data:', error));
        });

        // Fetch Post API Example
        const postForm = document.getElementById('postForm');
        const titleInput = document.getElementById('title');
        const bodyInput = document.getElementById('body');
        const postResponse = document.getElementById('postResponse');
        postForm.addEventListener('submit', async (event) => {
        event.preventDefault();
        const title = titleInput.value;
        const body = bodyInput.value;
        try {
            const response = await fetch('https://jsonplaceholder.typicode.com/posts', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ title, body, userId: 1 })
            });
            const data = await response.json();
            postResponse.textContent = JSON.stringify(data);
        } catch (error) {
            console.error('Error creating post:', error);
        }
        });

    </script>
</body>
</html>
